{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Escala de Sobreaviso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/estilo.css' %}" rel="stylesheet">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1d4ed8 100%);
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .login-card-header {
      background: var(--color-sidebar);
      padding: 32px 32px 24px;
      text-align: center;
      color: #fff;
    }
    .login-card-header .brand-icon {
      width: 48px; height: 48px;
      background: var(--color-primary);
      border-radius: 12px;
      display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 12px;
    }
    .login-card-header h1 { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 0; }
    .login-card-header p { font-size: .75rem; opacity: .7; margin: 4px 0 0; }
    .login-card-body { padding: 32px; }
    .login-card-body label { font-weight: 600; font-size: .8125rem; margin-bottom: 4px; }
    .login-card-body .form-control { padding: 10px 14px; font-size: .875rem; }
    .login-card-body .btn { padding: 10px 0; font-weight: 600; font-size: .875rem; }
    .login-footer { text-align: center; padding: 0 32px 24px; font-size: .7rem; color: #94a3b8; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card-header">
      <div class="brand-icon"><i class="bi bi-calendar-check"></i></div>
      <h1>Escala de Sobreaviso</h1>
      <p>Controle Gerencial — Grupo A e B</p>
    </div>
    <div class="login-card-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Usuário</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="Seu nome de usuário" required autofocus>
        </div>
        <div class="mb-3">
          <label for="id_password" class="form-label">Senha</label>
          <input type="password" name="password" id="id_password" class="form-control" placeholder="Sua senha" required>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger py-2 small mb-3"><i class="bi bi-exclamation-circle"></i> Usuário ou senha inválidos.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i> Entrar</button>
      </form>
    </div>
    <div class="login-footer">Curitiba, Paraná &copy; {% now "Y" %}</div>
  </div>
</div>
</body>
</html>
